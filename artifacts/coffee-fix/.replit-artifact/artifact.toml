kind = "web"
previewPath = "/"
title = "Coffee Fix – Faisalabad"
version = "1.0.0"
id = "artifacts/coffee-fix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19165

[services.development]
run = "pnpm --filter @workspace/coffee-fix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coffee-fix", "run", "build" ]
publicDir = "artifacts/coffee-fix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19165"
BASE_PATH = "/"
